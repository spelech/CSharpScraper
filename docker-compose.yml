services:
  playwright-csharp-scraper:
    image: ghcr.io/spelech/csharpscraper:latest
    container_name: playwright-csharp-scraper
    labels:
      # WUD auto-update configurations
      - wud.watch=true
      - wud.registry=ghcr
      - wud.tag.include=^latest$
      - wud.trigger.AUTOUPDATE.dryrun=false

      # Uptime Kuma Monitoring (AutoKuma)
      - kuma.scraper.http.name=Playwright Scraper MCP
      - kuma.scraper.http.url=http://playwright-csharp-scraper:8080/health
      - kuma.scraper.http.group=Infrastructure


    restart: unless-stopped
    ports:
      - "8428:8080"
    volumes:
      - ./temp_screenshots:/app/temp_screenshots
    environment:
      - TZ=${TZ:-America/Chicago}
      - DEFAULT_LLM_BASE_URL=${DEFAULT_LLM_BASE_URL:-http://litellm:4000/v1}
      - DEFAULT_LLM_API_KEY=${DEFAULT_LLM_API_KEY:-sk-placeholder}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-gemini-3.5-flash}
      - BROWSER_WS_ENDPOINT=${BROWSER_WS_ENDPOINT:-ws://browser-sockpuppet-chrome:3000}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-}
    networks:
      - net_webservices
      - net_cloud
      - net_mcp
    ipc: host # Important for Chromium sandbox inside Docker to prevent out-of-memory crashes
    security_opt:
      - seccomp=unconfined # Optional: helps Chromium sandbox run in container without root privilege issues

networks:
  net_webservices:
    external: true
  net_cloud:
    external: true
  net_mcp:
    external: true
